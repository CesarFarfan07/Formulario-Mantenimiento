services:
  - type: web
    name: formulario-mantenimiento
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python start.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bd-mantenimiento
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: bd-mantenimiento
    plan: free
    databaseName: mantenimiento
