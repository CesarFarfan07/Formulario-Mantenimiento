<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Configuración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-navbar border-bottom border-warning mb-4 py-0 navbar-expand-sm">
        <div class="container">
            <div class="d-flex align-items-center">
                <img src="/static/logo.jpg" alt="Logo" class="me-3 d-none d-sm-block" style="height:50px;width:auto;">
                <span class="navbar-brand mb-0 h1 text-warning fw-bold fs-6">
                    <i class="bi bi-gear me-2"></i>Administración
                </span>
            </div>
            <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAdmin">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarAdmin">
                <button class="btn btn-success btn-sm me-2" onclick="saveAllAdmin()"><i class="bi bi-check2-circle"></i> <span class="d-none d-sm-inline">Guardar todo</span></button>
                <a href="/" class="btn btn-outline-light btn-sm ms-auto"><i class="bi bi-house"></i> <span class="d-none d-sm-inline">Volver</span></a>
            </div>
        </div>
    </nav>

    <div id="passwordOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:rgba(15,20,25,0.95);z-index:9999;">
        <div class="card bg-dark border-warning" style="max-width:400px;width:90%;">
            <div class="card-body text-center p-4">
                <img src="/static/logo.jpg" alt="Logo" style="height:60px;width:auto;" class="mb-3">
                <h5 class="text-warning mb-3"><i class="bi bi-lock-fill"></i> Acceso restringido</h5>
                <p class="text-muted small mb-3">Ingrese la contraseña de administrador</p>
                <input type="password" class="form-control mb-3" id="adminPassword" placeholder="Contraseña" onkeydown="if(event.key==='Enter') verifyPassword()">
                <button class="btn btn-warning w-100" onclick="verifyPassword()"><i class="bi bi-unlock"></i> Ingresar</button>
                <div id="passwordError" class="text-danger small mt-2 d-none">Contraseña incorrecta</div>
                <a href="/" class="btn btn-sm btn-outline-light mt-3">← Volver al reporte</a>
            </div>
        </div>
    </div>

    <div id="adminContent" class="d-none">
        <div class="container mb-4">
            <!-- Tabs principales -->
            <ul class="nav nav-tabs nav-justified mb-4 border-secondary" id="mainTabs">
                <li class="nav-item"><button class="nav-link active text-warning" data-tab="independientes" onclick="switchMainTab('independientes')"><i class="bi bi-palette"></i> Config. General</button></li>
                <li class="nav-item"><button class="nav-link text-info" data-tab="trackless" onclick="switchMainTab('trackless')"><i class="bi bi-truck"></i> Mantto. Trackless</button></li>
                <li class="nav-item"><button class="nav-link text-success" data-tab="convencional" onclick="switchMainTab('convencional')"><i class="bi bi-tools"></i> Mantto. Convencional</button></li>
                <li class="nav-item"><button class="nav-link text-warning" data-tab="electrico" onclick="switchMainTab('electrico')"><i class="bi bi-lightning"></i> Mantto. Eléctrico</button></li>
            </ul>

            <!-- Panel: Config. General (Equipos, Colaboradores, Niveles, Turnos) -->
            <div id="tab-independientes" class="main-tab-content">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="card bg-dark border-secondary h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 text-warning"><i class="bi bi-building"></i> Equipos</h6>
                                <button class="btn btn-sm btn-success" onclick="showAddForm('equipos')"><i class="bi bi-plus-lg"></i></button>
                            </div>
                            <div class="card-body p-2" id="panel-equipos"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-warning"></div></div></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-dark border-secondary h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 text-info"><i class="bi bi-people"></i> Colaboradores</h6>
                                <button class="btn btn-sm btn-success" onclick="showAddForm('colaboradores')"><i class="bi bi-plus-lg"></i></button>
                            </div>
                            <div class="card-body p-2" id="panel-colaboradores"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-warning"></div></div></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-dark border-secondary h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 text-success"><i class="bi bi-layers"></i> Niveles</h6>
                                <button class="btn btn-sm btn-success" onclick="showAddForm('niveles')"><i class="bi bi-plus-lg"></i></button>
                            </div>
                            <div class="card-body p-2" id="panel-niveles"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-warning"></div></div></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card bg-dark border-secondary h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 text-info"><i class="bi bi-clock"></i> Turnos</h6>
                                <button class="btn btn-sm btn-success" onclick="showAddForm('turnos')"><i class="bi bi-plus-lg"></i></button>
                            </div>
                            <div class="card-body p-2" id="panel-turnos"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-warning"></div></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel: Trackless / Convencional / Electrico — unified view -->
            <div id="tab-trackless" class="main-tab-content d-none"><div id="panel-trackless" class="text-muted small">Cargando...</div></div>
            <div id="tab-convencional" class="main-tab-content d-none"><div id="panel-convencional" class="text-muted small">Cargando...</div></div>
            <div id="tab-electrico" class="main-tab-content d-none"><div id="panel-electrico" class="text-muted small">Cargando...</div></div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalTitle">Agregar</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="formModalBody">
                    <form id="adminForm">
                        <div id="formFields"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" onclick="saveForm()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/admin.js?v=6"></script>
</body>
</html>
