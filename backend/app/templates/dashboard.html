<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Reporte Diario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="/static/css/style.css?v=5" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0b1120; background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,158,11,.06) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 20%, rgba(59,130,246,.05) 0%, transparent 50%), radial-gradient(ellipse 50% 50% at 20% 80%, rgba(16,185,129,.04) 0%, transparent 50%); min-height: 100vh; }
        .glass { background: rgba(30,41,59,.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.06); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.25); transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .3s ease; }
        .glass:hover { transform: translateY(-2px); box-shadow: 0 12px 48px rgba(0,0,0,.4); }
        .kpi-card { position: relative; overflow: hidden; padding: 1.4rem 1.1rem; cursor: default; }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; border-radius: 16px 16px 0 0; }
        .kpi-card .kpi-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: .6rem; transition: transform .3s ease; }
        .kpi-card:hover .kpi-icon { transform: scale(1.1) rotate(-3deg); }
        .kpi-card .kpi-value { font-size: 2rem; font-weight: 800; line-height: 1; letter-spacing: -1px; }
        .kpi-card .kpi-label { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; opacity: .7; margin-top: .15rem; }
        .kpi-card .kpi-sub { font-size: .65rem; opacity: .45; margin-top: .15rem; }
        .kpi-cmp { font-size: .65rem; font-weight: 600; margin-top: .2rem; }
        .kpi-cmp.up { color: #10b981; } .kpi-cmp.down { color: #ef4444; } .kpi-cmp.neutral { color: #94a3b8; }
        .kpi-card.bw::before { background: linear-gradient(90deg,#f59e0b,#f97316); }
        .kpi-card.bi::before { background: linear-gradient(90deg,#3b82f6,#06b6d4); }
        .kpi-card.bp::before { background: linear-gradient(90deg,#6366f1,#8b5cf6); }
        .kpi-card.bg::before { background: linear-gradient(90deg,#10b981,#34d399); }
        .kpi-card.br::before { background: linear-gradient(90deg,#ef4444,#f43f5e); }
        .kpi-card.bc::before { background: linear-gradient(90deg,#f97316,#f59e0b); }
        .kpi-card.bp2::before { background: linear-gradient(90deg,#8b5cf6,#a855f7); }
        .kpi-card.bgr::before { background: linear-gradient(90deg,#14b8a6,#10b981); }
        .kpi-icon.bg-wa { background: linear-gradient(135deg,#f59e0b22,#f9731622); color: #f59e0b; }
        .kpi-icon.bg-in { background: linear-gradient(135deg,#3b82f622,#06b6d422); color: #3b82f6; }
        .kpi-icon.bg-pr { background: linear-gradient(135deg,#6366f122,#8b5cf622); color: #8b5cf6; }
        .kpi-icon.bg-gr { background: linear-gradient(135deg,#10b98122,#34d39922); color: #10b981; }
        .kpi-icon.bg-re { background: linear-gradient(135deg,#ef444422,#f43f5e22); color: #f43f5e; }
        .kpi-icon.bg-or { background: linear-gradient(135deg,#f9731622,#f59e0b22); color: #f97316; }
        .kpi-icon.bg-pu { background: linear-gradient(135deg,#8b5cf622,#a855f722); color: #a855f7; }
        .kpi-icon.bg-te { background: linear-gradient(135deg,#14b8a622,#10b98122); color: #14b8a6; }
        .section-title { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; padding-bottom: .4rem; border-bottom: 1px solid rgba(255,255,255,.05); }
        .section-title i { font-size: 1.1rem; }
        .worker-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem .6rem; border-radius: 8px; transition: background .15s; }
        .worker-row:hover { background: rgba(255,255,255,.04); }
        .worker-row + .worker-row { border-top: 1px solid rgba(255,255,255,.04); }
        .worker-name { font-weight: 500; font-size: .82rem; display: flex; align-items: center; gap: .4rem; }
        .worker-name .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; }
        .team-badge { font-size: .6rem; font-weight: 600; padding: .2em .6em; border-radius: 20px; letter-spacing: .3px; }
        .chart-container { position: relative; width: 100%; }
        .chart-container-md { height: 220px; }
        .chart-container-lg { height: 260px; }
        .chart-container-sm { height: 160px; }
        .dur-bar-track { height: 8px; border-radius: 10px; background: rgba(255,255,255,.06); overflow: hidden; }
        .dur-bar-fill { height: 100%; border-radius: 10px; transition: width 1s cubic-bezier(.4,0,.2,1); }
        .progress-okr { height: 8px; border-radius: 10px; background: rgba(255,255,255,.06); overflow: hidden; }
        .progress-okr .bar { height: 100%; border-radius: 10px; transition: width 1s ease; position: relative; }
        .okr-card { padding: 1rem 1.1rem; border-left: 3px solid; transition: background .15s; border-radius: 0 12px 12px 0; }
        .okr-card:hover { background: rgba(255,255,255,.02); }
        .equip-table { font-size: .78rem; }
        .equip-table thead th { font-weight: 600; text-transform: uppercase; letter-spacing: .5px; font-size: .65rem; color: rgba(255,255,255,.4); border-bottom: 1px solid rgba(255,255,255,.06); padding: .5rem .4rem; }
        .equip-table tbody td { padding: .4rem; border-bottom: 1px solid rgba(255,255,255,.03); }
        .equip-table tbody tr { transition: background .12s; cursor: default; }
        .equip-table tbody tr:hover { background: rgba(255,255,255,.03); }
        .equip-rank { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; font-size: .6rem; font-weight: 700; }
        .equip-rank.gold { background: #f59e0b22; color: #f59e0b; }
        .equip-rank.silver { background: #94a3b822; color: #94a3b8; }
        .equip-rank.bronze { background: #d9770622; color: #d97706; }
        .equip-rank.default { background: rgba(255,255,255,.05); color: rgba(255,255,255,.35); }
        .count-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 26px; height: 24px; border-radius: 20px; font-size: .7rem; font-weight: 700; }
        .filter-input { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; color: #cbd5e1; padding: .35rem .7rem; font-size: .8rem; transition: border-color .2s; }
        .filter-input:focus { outline: none; border-color: #f59e0b; background: rgba(255,255,255,.08); }
        .filter-input::placeholder { color: rgba(255,255,255,.2); }
        .filter-select { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; color: #cbd5e1; padding: .35rem .7rem; font-size: .8rem; }
        .filter-select:focus { outline: none; border-color: #f59e0b; }
        #comparePanel { display: none; }
        #comparePanel.show { display: block; }
        .cmp-header { font-size: .8rem; font-weight: 600; padding: .4rem .8rem; border-radius: 8px; margin-bottom: .5rem; }
        .week-row { display: flex; justify-content: space-between; align-items: center; padding: .4rem .5rem; border-radius: 8px; transition: background .15s; }
        .week-row:hover { background: rgba(255,255,255,.03); }
        .week-row + .week-row { border-top: 1px solid rgba(255,255,255,.04); }
        .btn-dash { border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: rgba(255,255,255,.6); border-radius: 10px; padding: .35rem .85rem; font-size: .78rem; transition: all .2s; }
        .btn-dash:hover { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.2); }
        .btn-dash.primary { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: #f59e0b; }
        .btn-dash.primary:hover { background: rgba(245,158,11,.25); }
        .btn-dash i { transition: transform .5s ease; }
        .btn-dash.spinning i { transform: rotate(360deg); }
        .navbar-custom { background: rgba(11,17,32,.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,.05); }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .anim-card { animation: fadeSlideUp .4s ease both; }
        .anim-card:nth-child(1) { animation-delay: 0s; }
        .anim-card:nth-child(2) { animation-delay: .05s; }
        .anim-card:nth-child(3) { animation-delay: .1s; }
        .anim-card:nth-child(4) { animation-delay: .15s; }
        .anim-card:nth-child(5) { animation-delay: .2s; }
        .anim-card:nth-child(6) { animation-delay: .25s; }
        .anim-card:nth-child(7) { animation-delay: .3s; }
        .anim-card:nth-child(8) { animation-delay: .35s; }
        .anim-section { animation: fadeSlideUp .5s ease both; }
        .anim-section:nth-child(1) { animation-delay: .1s; }
        .anim-section:nth-child(2) { animation-delay: .2s; }
        .anim-section:nth-child(3) { animation-delay: .3s; }
        .anim-section:nth-child(4) { animation-delay: .4s; }
        .anim-section:nth-child(5) { animation-delay: .5s; }
        .anim-section:nth-child(6) { animation-delay: .6s; }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.07) 50%, rgba(255,255,255,.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 10px; }
        @media (max-width: 576px) { .kpi-card .kpi-value { font-size: 1.4rem; } .kpi-card { padding: 1rem; } }
        @media (min-width: 1400px) { .container { max-width: 1400px; } }
    </style>
</head>
<body>

    <!-- ─── NAVBAR ─── -->
    <nav class="navbar navbar-dark navbar-custom mb-3 py-2">
        <div class="container">
            <a href="/" class="navbar-brand mb-0 h1 fw-bold fs-6" style="color:#f59e0b;">
                <i class="bi bi-tools me-2"></i>Reporte Diario
                <span style="font-size:.6rem;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:1px;margin-left:.4rem;">DASHBOARD</span>
            </a>
            <div class="d-flex gap-2 align-items-center">
                <span id="lastUpdate" class="small" style="color:rgba(255,255,255,.25);font-size:.65rem;"></span>
                <button class="btn-dash" id="refreshBtn" onclick="refreshDashboard()"><i class="bi bi-arrow-clockwise me-1"></i> Actualizar</button>
                <a href="/" class="btn btn-sm" style="border:1px solid rgba(255,255,255,.08);border-radius:10px;color:rgba(255,255,255,.4);padding:.25rem .6rem;"><i class="bi bi-x-lg" style="font-size:.7rem;"></i></a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">

        <!-- ─── FILTER BAR ─── -->
        <div class="glass p-3 mb-4 anim-section">
            <div class="row g-2 align-items-end">
                <div class="col-6 col-md-2">
                    <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.5;display:block;margin-bottom:4px;">Desde</label>
                    <input type="date" class="filter-input w-100" id="filterFrom">
                </div>
                <div class="col-6 col-md-2">
                    <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.5;display:block;margin-bottom:4px;">Hasta</label>
                    <input type="date" class="filter-input w-100" id="filterTo">
                </div>
                <div class="col-6 col-md-2">
                    <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.5;display:block;margin-bottom:4px;">Grupo</label>
                    <select class="filter-select w-100" id="filterGroup">
                        <option value="">Todos</option>
                        <option value="Mantt. Eq. Trackless">Trackless</option>
                        <option value="Mantt. Eq. Convencional">Convencional</option>
                        <option value="Mantt. Eq. Electrico">Eléctrico</option>
                    </select>
                </div>
                <div class="col-6 col-md-3">
                    <div class="d-flex align-items-center gap-2" style="padding-top:6px;">
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="toggleCompare" style="cursor:pointer;">
                            <label class="form-check-label" for="toggleCompare" style="font-size:.75rem;cursor:pointer;opacity:.6;">Comparar</label>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <button class="btn-dash primary w-100" onclick="applyFilters()"><i class="bi bi-funnel me-1"></i> Aplicar Filtros</button>
                </div>
            </div>
            <!-- Comparison period (hidden by default) -->
            <div id="comparePanel" class="mt-2">
                <div class="row g-2 align-items-end">
                    <div class="col-6 col-md-2">
                        <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.5;display:block;margin-bottom:4px;">Comparar Desde</label>
                        <input type="date" class="filter-input w-100" id="cmpFrom">
                    </div>
                    <div class="col-6 col-md-2">
                        <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.5;display:block;margin-bottom:4px;">Comparar Hasta</label>
                        <input type="date" class="filter-input w-100" id="cmpTo">
                    </div>
                    <div class="col-12 col-md-4">
                        <span style="font-size:.7rem;opacity:.35;">Compara dos períodos para ver evolución</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ─── PERIOD LABEL ─── -->
        <div id="periodLabel" class="mb-3" style="font-size:.8rem;opacity:.5;text-align:center;letter-spacing:.3px;"></div>

        <!-- ─── KPI ROW ─── -->
        <div class="row g-2 g-md-3 mb-4" id="kpiRow">
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bw"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bi"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bp"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bg"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card br"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bc"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bp2"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
            <div class="col-6 col-md-3 col-xl"><div class="glass kpi-card bgr"><div class="skeleton" style="width:42px;height:42px;border-radius:12px;margin-bottom:.6rem;"></div><div class="skeleton" style="width:55%;height:28px;border-radius:5px;margin-bottom:4px;"></div><div class="skeleton" style="width:35%;height:10px;border-radius:3px;"></div></div></div>
        </div>

        <!-- ─── MAIN GRID (auto-filled by JS) ─── -->
        <div id="dashboardGrid"></div>

        <!-- ─── OKR SECTION ─── -->
        <div class="anim-section" id="okrSection">
            <div class="glass p-3 p-md-4">
                <div class="section-title" style="color:#f59e0b;"><i class="bi bi-bullseye"></i> OKRs Sugeridos <span style="font-weight:400;font-size:.7rem;opacity:.4;">Basados en datos reales del período</span></div>
                <div id="okrContainer"><div class="skeleton" style="height:180px;border-radius:10px;"></div></div>
            </div>
        </div>

    </div>

    <script src="/static/js/dashboard.js?v=4"></script>
</body>
</html>
