<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero RACS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css?v=6" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-navbar border-bottom border-warning mb-4 py-0 navbar-expand-md">
        <div class="container">
            <div class="d-flex align-items-center">
                <img src="/static/logo.jpg" alt="Logo" class="me-3 d-none d-sm-block" style="height:50px;width:auto;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">
                <span class="navbar-brand mb-0 h1 text-warning fw-bold fs-6 fs-md-5">
                    <i class="bi bi-bar-chart me-2"></i>Tablero RACS
                </span>
            </div>
            <button class="navbar-toggler border-0 p-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarRacsD">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarRacsD">
                <div class="d-flex flex-wrap gap-1 ms-auto py-2 py-md-0">
                    <a href="/" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-tools"></i> <span class="d-none d-sm-inline">Formulario</span>
                    </a>
                    <a href="/racs" class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-plus-circle"></i> <span class="d-none d-sm-inline">Enviar RACS</span>
                    </a>
                    <a href="/racs/dashboard" class="btn btn-info btn-sm">
                        <i class="bi bi-bar-chart"></i> <span class="d-none d-sm-inline">Tablero RACS</span>
                    </a>
                    <a href="/dashboard" class="btn btn-outline-info btn-sm">
                        <i class="bi bi-graph-up"></i> <span class="d-none d-sm-inline">Dashboard</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mb-4">
        <div class="card">
            <div class="card-header">
                <div class="d-flex align-items-center gap-2">
                    <span style="font-size:1.8rem;">🦺</span>
                    <div>
                        <h5 class="mb-0">Tablero RACS</h5>
                        <small class="text-muted" id="dashboardPeriodLabel">Cargando...</small>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <!-- Summary cards -->
                <div class="row g-2 mb-3" id="summaryRow">
                    <div class="col-4 col-md-2">
                        <div class="p-2 rounded text-center" style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);">
                            <div class="small text-muted">✅ Completos</div>
                            <div class="fs-4 fw-bold" style="color:#10b981;" id="summaryComplete">0</div>
                        </div>
                    </div>
                    <div class="col-4 col-md-2">
                        <div class="p-2 rounded text-center" style="background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);">
                            <div class="small text-muted">🟡 Parcial</div>
                            <div class="fs-4 fw-bold" style="color:#f59e0b;" id="summaryPartial">0</div>
                        </div>
                    </div>
                    <div class="col-4 col-md-2">
                        <div class="p-2 rounded text-center" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);">
                            <div class="small text-muted">🔴 Pendientes</div>
                            <div class="fs-4 fw-bold" style="color:#ef4444;" id="summaryMissing">0</div>
                        </div>
                    </div>
                    <div class="col-4 col-md-2">
                        <div class="p-2 rounded text-center" style="background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.3);">
                            <div class="small text-muted">👥 En unidad</div>
                            <div class="fs-4 fw-bold" style="color:#60a5fa;" id="summaryTotal">0</div>
                        </div>
                    </div>
                    <div class="col-4 col-md-2">
                        <div class="p-2 rounded text-center" style="background:rgba(200,150,0,0.12);border:1px solid rgba(200,150,0,0.3);">
                            <div class="small text-muted">🌙 Descanso</div>
                            <div class="fs-4 fw-bold" style="color:#eab308;" id="summaryRest">0</div>
                        </div>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="mb-3 d-flex flex-wrap gap-2">
                    <button class="btn btn-success btn-sm" onclick="notifyMissingRacs()">
                        <i class="bi bi-whatsapp"></i> Enviar comunicado a morosos por WhatsApp
                    </button>
                    <a href="/api/racs/database-excel" class="btn btn-outline-info btn-sm">
                        <i class="bi bi-database"></i> Descargar Base de Datos
                    </a>
                </div>

                <!-- Team tables -->
                <div id="racsTeamsContainer"></div>

                <!-- History -->
                <div class="mt-4">
                    <h6 class="text-info mb-2"><i class="bi bi-clock-history"></i> RACS enviados este período</h6>
                    <div id="racsHistoryContainer">
                        <p class="text-muted small">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/racs.js?v=5"></script>
</body>
</html>
